<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Rush - Snake Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍎 Apple Rush 🍎</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">Score:</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">High Score:</span>
                    <span class="value" id="highScore">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Apples Eaten:</span>
                    <span class="value" id="applesEaten">0</span>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="controls">
            <button id="startBtn" class="btn btn-primary">Start Game</button>
            <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
            <button id="resetBtn" class="btn btn-danger">Reset</button>
        </div>

        <div class="instructions">
            <h2>How to Play:</h2>
            <ul>
                <li>🎮 Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move the worm</li>
                <li>🍎 Eat the red apples to grow longer and earn points</li>
                <li>⚠️ Don't hit the walls or yourself!</li>
                <li>⏸️ Press <strong>Space</strong> to pause/resume</li>
                <li>🚀 The game gets harder as you eat more apples</li>
            </ul>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
